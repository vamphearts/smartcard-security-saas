# Базовая конфигурация кластера: один Pod с четырьмя контейнерами
# Вариант 216 — Smart-card Security SaaS
---
apiVersion: v1
kind: Namespace
metadata:
  name: smartcard-security
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smartcard-security
data:
  POSTGRES_DB: smartcard_db
  POSTGRES_USER: app
  DATABASE_URL: postgresql://app:smartcard_secret@127.0.0.1:5432/smartcard_db
  PGADMIN_DEFAULT_EMAIL: admin@example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: smartcard-security
type: Opaque
stringData:
  POSTGRES_PASSWORD: smartcard_secret
  PGADMIN_DEFAULT_PASSWORD: admin123
---
apiVersion: v1
kind: Pod
metadata:
  name: smartcard-security-pod
  namespace: smartcard-security
  labels:
    app: smartcard-security
    variant: "216"
spec:
  restartPolicy: Always
  containers:
    - name: db
      image: postgres:16-alpine
      ports:
        - containerPort: 5432
          name: postgres
      env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      readinessProbe:
        exec:
          command: ["pg_isready", "-U", "app", "-d", "smartcard_db"]
        initialDelaySeconds: 5
        periodSeconds: 5

    - name: web
      image: smartcard-web:1.0
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8000
          name: http
      env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_URL
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 15
        periodSeconds: 10

    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
          name: http
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true

    - name: pgadmin
      image: dpage/pgadmin4:8.11
      ports:
        - containerPort: 8888
          name: pgadmin
      env:
        - name: PGADMIN_LISTEN_PORT
          value: "8888"
        - name: PGADMIN_DEFAULT_EMAIL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PGADMIN_DEFAULT_EMAIL
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: PGADMIN_DEFAULT_PASSWORD
        - name: PGADMIN_CONFIG_SERVER_MODE
          value: "False"

  volumes:
    - name: pgdata
      emptyDir: {}
    - name: nginx-config
      configMap:
        name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: smartcard-security
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
        upstream web_backend { server 127.0.0.1:8000; }
        server {
            listen 80;
            location / {
                proxy_pass http://web_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
            location /health {
                proxy_pass http://web_backend/health;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: smartcard-service
  namespace: smartcard-security
spec:
  type: NodePort
  selector:
    app: smartcard-security
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: pgadmin
      port: 5050
      targetPort: 8888
      nodePort: 30050
