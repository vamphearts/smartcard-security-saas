services:
  nginx:
    image: nginx:1.27-alpine
    container_name: smartcard-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - smartcard-net

  web:
    build: ./app
    container_name: smartcard-web
    environment:
      DATABASE_URL: postgresql://app:smartcard_secret@db:5432/smartcard_db
      FLASK_DEBUG: "0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcard-net

  db:
    image: postgres:16-alpine
    container_name: smartcard-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: smartcard_secret
      POSTGRES_DB: smartcard_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d smartcard_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smartcard-net

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: smartcard-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartcard-net

networks:
  smartcard-net:
    driver: bridge

volumes:
  pgdata:
